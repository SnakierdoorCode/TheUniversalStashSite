<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #moviePlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background-color: #000;
        }
    </style>
</head>
<body>

    <iframe id="moviePlayer" allow="autoplay; fullscreen" allowfullscreen></iframe>

<script>
    const targetLink = "https://drive.google.com/file/d/1V3Bq0lrDQUxJay5DDs3gK69ZvRNb1j2u/view?pli=1";

    function getEmbeddedUrl(url) {
        if (url.includes("drive.google.com")) {
            const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/) || url.match(/id=([a-zA-Z0-9-_]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/file/d/${match[1]}/preview`;
            }
        }
        return url;
    }

    document.getElementById('moviePlayer').src = getEmbeddedUrl(targetLink);
</script>

</body>
</html>
